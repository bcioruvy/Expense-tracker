<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger</title>
<style>
  :root {
    --bg: #F5F2ED;
    --bg-card: #FAF8F5;
    --bg-input: #EDEAE3;
    --border: #D8D2C7;
    --border-sub: #E5E0D8;
    --text: #1A1814;
    --text2: #6B6560;
    --muted: #9E9890;
    --accent-bg: #2C2420;
    --accent-txt: #FAF8F5;
    --green: #3D5A47;
    --green-bg: #EDF2EF;
    --red: #7A3B2E;
    --red-bg: #F5EEEC;
    --tog-bg: #C0BAB0;
    --tog-dot: #FAF8F5;
  }
  .dark {
    --bg: #141210;
    --bg-card: #201D1A;
    --bg-input: #1C1916;
    --border: #312D28;
    --border-sub: #272320;
    --text: #EDE8E0;
    --text2: #857E74;
    --muted: #52504A;
    --accent-bg: #D4CEC5;
    --accent-txt: #141210;
    --green: #5A8A6A;
    --green-bg: #1A2820;
    --red: #A06050;
    --red-bg: #281A18;
    --tog-bg: #4A4540;
    --tog-dot: #D4CEC5;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-font-smoothing:antialiased; }
  body {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }
  /* HEADER */
  .hdr {
    background: var(--bg-card);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    height: 58px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: -webkit-sticky;
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .logo { font-size: 22px; font-weight: 300; letter-spacing: 2px; text-transform: uppercase; color: var(--text); }
  .logo b { font-weight: 600; }
  .hdr-r { display: flex; align-items: center; gap: 10px; }
  .tlabel { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .tog {
    width: 46px; height: 26px;
    background: var(--tog-bg);
    border-radius: 13px;
    position: relative;
    cursor: pointer;
    border: none;
    outline: none;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.3s;
    flex-shrink: 0;
  }
  .tog-dot {
    position: absolute;
    width: 20px; height: 20px;
    background: var(--tog-dot);
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform 0.3s, background 0.3s;
  }
  .dark .tog-dot { transform: translateX(20px); }
  /* CONTAINER */
  .wrap { max-width: 860px; margin: 0 auto; padding: 28px 16px; }
  /* SUMMARY */
  .summary { display: flex; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
  .sc { flex: 1; background: var(--bg-card); padding: 18px 20px; }
  .sc + .sc { border-left: 1px solid var(--border); }
  .sc-lbl { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  .sc-amt { font-size: 26px; font-weight: 200; letter-spacing: -0.5px; }
  .sc-amt.g { color: var(--green); }
  .sc-amt.r { color: var(--red); }
  .sc-amt.n { color: var(--text); }
  .sc-sub { font-size: 9px; color: var(--muted); margin-top: 4px; letter-spacing: 0.5px; }
  /* FORM CARD */
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 4px; padding: 20px; margin-bottom: 20px; }
  .clbl { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }
  .frow { display: grid; grid-template-columns: 2fr 1.2fr 1fr 0.9fr auto; gap: 8px; align-items: end; }
  .fg { display: flex; flex-direction: column; gap: 5px; }
  .fg label { font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }
  .fg input, .fg select {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 9px 11px;
    font-family: inherit;
    font-size: 13px;
    color: var(--text);
    outline: none;
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
  }
  .fg input::placeholder { color: var(--muted); }
  .fg input:focus, .fg select:focus { border-color: #8B6F5E; }
  .btn-add {
    background: var(--accent-bg);
    color: var(--accent-txt);
    border: none;
    border-radius: 3px;
    padding: 9px 14px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    align-self: flex-end;
    -webkit-tap-highlight-color: transparent;
  }
  /* TXNS */
  .txn-hdr { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .filters { display: flex; gap: 6px; }
  .fbtn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 4px 12px;
    font-family: inherit;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .fbtn.on { background: var(--accent-bg); color: var(--accent-txt); border-color: var(--accent-bg); }
  /* DATE GROUP */
  .dg { margin-bottom: 18px; }
  .dg-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding-bottom: 7px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 0;
  }
  .dg-date { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .dg-net { font-size: 14px; font-weight: 300; }
  /* TXN ROW */
  .trow {
    display: grid;
    grid-template-columns: 1fr auto auto;
    align-items: center;
    gap: 12px;
    padding: 11px 0;
    border-bottom: 1px solid var(--border-sub);
  }
  .trow:last-child { border-bottom: none; }
  .tdesc { font-size: 13px; color: var(--text); margin-bottom: 3px; font-weight: 400; }
  .tmeta { display: flex; gap: 6px; }
  .tag {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 2px;
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-weight: 500;
  }
  .tg { background: var(--green-bg); color: var(--green); }
  .tr { background: var(--red-bg); color: var(--red); }
  .tamt { font-size: 16px; font-weight: 300; min-width: 95px; text-align: right; }
  .tamt.g { color: var(--green); }
  .tamt.r { color: var(--red); }
  .tbtns { display: flex; gap: 5px; }
  .bedit, .bdel {
    background: none;
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 4px 9px;
    font-family: inherit;
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--text2);
    -webkit-tap-highlight-color: transparent;
  }
  .empty { text-align: center; padding: 48px 0; font-size: 14px; font-weight: 300; font-style: italic; color: var(--muted); }
  /* MODAL */
  .ov {
    display: none;
    position: fixed;
    top:0;left:0;right:0;bottom:0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .ov.show { display: flex; }
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 24px;
    width: 92%;
    max-width: 420px;
  }
  .modal-title { font-size: 20px; font-weight: 300; margin-bottom: 18px; color: var(--text); }
  .mfg { margin-bottom: 12px; }
  .mfg label { display: block; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
  .mfg input, .mfg select {
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 9px 11px;
    font-family: inherit;
    font-size: 13px;
    color: var(--text);
    outline: none;
    width: 100%;
    -webkit-appearance: none;
    appearance: none;
  }
  .mfg input:focus, .mfg select:focus { border-color: #8B6F5E; }
  .macts { display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px; }
  .bcancel {
    background: none;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px 16px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    color: var(--text2);
    -webkit-tap-highlight-color: transparent;
  }
  .bsave {
    background: var(--accent-bg);
    color: var(--accent-txt);
    border: none;
    border-radius: 3px;
    padding: 8px 20px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  @media (max-width: 620px) {
    .frow { grid-template-columns: 1fr 1fr; }
    .frow .btn-add { grid-column: span 2; }
    .summary { flex-direction: column; }
    .sc + .sc { border-left: none; border-top: 1px solid var(--border); }
  }
</style>
</head>
<body>

<div class="hdr">
  <div class="logo"><b>Ledger</b></div>
  <div class="hdr-r">
    <span class="tlabel" id="tlbl">Day</span>
    <button class="tog" id="tog" onclick="toggleTheme()">
      <div class="tog-dot" id="togdot"></div>
    </button>
  </div>
</div>

<div class="wrap">
  <div class="summary">
    <div class="sc">
      <div class="sc-lbl">Total Inflows</div>
      <div class="sc-amt g" id="sIn">PKR 0</div>
      <div class="sc-sub">All recorded income</div>
    </div>
    <div class="sc">
      <div class="sc-lbl">Total Outflows</div>
      <div class="sc-amt r" id="sOut">PKR 0</div>
      <div class="sc-sub">All recorded expenses</div>
    </div>
    <div class="sc">
      <div class="sc-lbl">Net Balance</div>
      <div class="sc-amt n" id="sNet">PKR 0</div>
      <div class="sc-sub">Current position</div>
    </div>
  </div>

  <div class="card">
    <div class="clbl">Record Transaction</div>
    <div class="frow">
      <div class="fg">
        <label>Description</label>
        <input type="text" id="iD" placeholder="e.g. Groceries, Rent...">
      </div>
      <div class="fg">
        <label>Amount (PKR)</label>
        <input type="number" id="iA" placeholder="0.00" min="0">
      </div>
      <div class="fg">
        <label>Date</label>
        <input type="date" id="iDt">
      </div>
      <div class="fg">
        <label>Type</label>
        <select id="iT">
          <option value="out">Expense</option>
          <option value="in">Inflow</option>
        </select>
      </div>
      <button class="btn-add" onclick="addTxn()">Add</button>
    </div>
  </div>

  <div class="txn-hdr">
    <div class="clbl" style="margin:0">Transactions</div>
    <div class="filters">
      <button class="fbtn on" onclick="setF('all',this)">All</button>
      <button class="fbtn" onclick="setF('in',this)">Inflows</button>
      <button class="fbtn" onclick="setF('out',this)">Expenses</button>
    </div>
  </div>
  <div id="list"></div>
</div>

<div class="ov" id="ov" onclick="ovClick(event)">
  <div class="modal">
    <div class="modal-title">Edit Transaction</div>
    <div class="mfg"><label>Description</label><input type="text" id="eD"></div>
    <div class="mfg"><label>Amount (PKR)</label><input type="number" id="eA" min="0"></div>
    <div class="mfg"><label>Date</label><input type="date" id="eDt"></div>
    <div class="mfg">
      <label>Type</label>
      <select id="eT">
        <option value="out">Expense</option>
        <option value="in">Inflow</option>
      </select>
    </div>
    <div class="macts">
      <button class="bcancel" onclick="closeModal()">Cancel</button>
      <button class="bsave" onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script>
var txns = [], editId = null, filt = 'all';
try { txns = JSON.parse(localStorage.getItem('ldg4') || '[]'); } catch(e) {}

// theme
var theme = 'light';
try { theme = localStorage.getItem('ldg4t') || 'light'; } catch(e) {}
applyTheme(theme);

function applyTheme(t) {
  theme = t;
  if (t === 'dark') {
    document.body.classList.add('dark');
  } else {
    document.body.classList.remove('dark');
  }
  document.getElementById('tlbl').textContent = t === 'dark' ? 'Night' : 'Day';
  try { localStorage.setItem('ldg4t', t); } catch(e) {}
}

function toggleTheme() {
  applyTheme(theme === 'light' ? 'dark' : 'light');
}

// today
function td() {
  var d = new Date();
  var m = d.getMonth()+1, dy = d.getDate();
  return d.getFullYear()+'-'+(m<10?'0'+m:m)+'-'+(dy<10?'0'+dy:dy);
}
document.getElementById('iDt').value = td();

function fmt(n) {
  return 'PKR '+Math.abs(n).toLocaleString('en',{maximumFractionDigits:2});
}

function fdate(s) {
  var p=s.split('-'), mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
      wd=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
      dt=new Date(+p[0],+p[1]-1,+p[2]);
  return (s===td()?'Today':wd[dt.getDay()])+', '+p[2]+' '+mo[+p[1]-1]+' '+p[0];
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function save() { try { localStorage.setItem('ldg4',JSON.stringify(txns)); } catch(e) {} }

function addTxn() {
  var d=document.getElementById('iD').value.trim(),
      a=parseFloat(document.getElementById('iA').value),
      dt=document.getElementById('iDt').value,
      t=document.getElementById('iT').value;
  if(!d||!a||a<=0||!dt) return;
  txns.push({id:Date.now()+''+Math.floor(Math.random()*9999),desc:d,amt:a,date:dt,type:t});
  save();
  document.getElementById('iD').value='';
  document.getElementById('iA').value='';
  document.getElementById('iDt').value=td();
  document.getElementById('iT').value='out';
  render();
}

function setF(f, btn) {
  filt=f;
  var bs=document.querySelectorAll('.fbtn');
  for(var i=0;i<bs.length;i++) bs[i].className='fbtn';
  btn.className='fbtn on';
  render();
}

function openEdit(id) {
  var t=null;
  for(var i=0;i<txns.length;i++) if(txns[i].id===id){t=txns[i];break;}
  if(!t) return;
  editId=id;
  document.getElementById('eD').value=t.desc;
  document.getElementById('eA').value=t.amt;
  document.getElementById('eDt').value=t.date;
  document.getElementById('eT').value=t.type;
  document.getElementById('ov').className='ov show';
}

function closeModal() { document.getElementById('ov').className='ov'; editId=null; }

function ovClick(e) { if(e.target===document.getElementById('ov')) closeModal(); }

function saveEdit() {
  var t=null;
  for(var i=0;i<txns.length;i++) if(txns[i].id===editId){t=txns[i];break;}
  if(!t) return;
  var d=document.getElementById('eD').value.trim(),
      a=parseFloat(document.getElementById('eA').value),
      dt=document.getElementById('eDt').value,
      tp=document.getElementById('eT').value;
  if(!d||!a||a<=0||!dt) return;
  t.desc=d;t.amt=a;t.date=dt;t.type=tp;
  save();closeModal();render();
}

function delTxn(id) {
  txns=txns.filter(function(t){return t.id!==id;});
  save();render();
}

function render() {
  var tIn=0,tOut=0;
  for(var i=0;i<txns.length;i++) txns[i].type==='in'?tIn+=txns[i].amt:tOut+=txns[i].amt;
  var net=tIn-tOut;
  document.getElementById('sIn').textContent=fmt(tIn);
  document.getElementById('sOut').textContent=fmt(tOut);
  document.getElementById('sNet').textContent=(net<0?'- ':'')+fmt(net);

  var vis=filt==='all'?txns:txns.filter(function(t){return t.type===filt;});
  var el=document.getElementById('list');
  if(!vis.length){el.innerHTML='<div class="empty">No transactions recorded yet.</div>';return;}

  var grp={};
  for(var i=0;i<vis.length;i++){var d=vis[i].date;if(!grp[d])grp[d]=[];grp[d].push(vis[i]);}
  var dates=Object.keys(grp).sort(function(a,b){return a<b?1:-1;});

  var h='';
  for(var di=0;di<dates.length;di++){
    var date=dates[di],g=grp[date],dI=0,dO=0;
    for(var gi=0;gi<g.length;gi++) g[gi].type==='in'?dI+=g[gi].amt:dO+=g[gi].amt;
    var dn=dI-dO, nc=dn>=0?'var(--green)':'var(--red)';
    h+='<div class="dg"><div class="dg-head"><span class="dg-date">'+fdate(date)+'</span>';
    h+='<span class="dg-net" style="color:'+nc+'">'+(dn>=0?'+ ':'- ')+fmt(Math.abs(dn))+'</span></div>';
    for(var ti=0;ti<g.length;ti++){
      var t=g[ti],ic=t.type==='in';
      h+='<div class="trow">';
      h+='<div><div class="tdesc">'+esc(t.desc)+'</div><div class="tmeta"><span class="tag '+(ic?'tg':'tr')+'">'+(ic?'Inflow':'Expense')+'</span></div></div>';
      h+='<div class="tamt '+(ic?'g':'r')+'">'+(ic?'+ ':'- ')+fmt(t.amt)+'</div>';
      h+='<div class="tbtns"><button class="bedit" onclick="openEdit(\''+t.id+'\')">Edit</button>';
      h+='<button class="bdel" onclick="delTxn(\''+t.id+'\')">Del</button></div></div>';
    }
    h+='</div>';
  }
  el.innerHTML=h;
}
render();
</script>

</body>
</html>
