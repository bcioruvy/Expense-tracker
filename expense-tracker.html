<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger</title>
<style>
  :root {
    --bg:#F5F2ED; --bg-card:#FAF8F5; --bg-input:#EDEAE3;
    --border:#D8D2C7; --border-sub:#E5E0D8;
    --text:#1A1814; --text2:#6B6560; --muted:#9E9890;
    --accent-bg:#2C2420; --accent-txt:#FAF8F5;
    --green:#3D5A47; --green-bg:#EDF2EF;
    --red:#7A3B2E; --red-bg:#F5EEEC;
    --tog-bg:#C0BAB0; --tog-dot:#FAF8F5;
  }
  .dark {
    --bg:#141210; --bg-card:#201D1A; --bg-input:#272320;
    --border:#3A3530; --border-sub:#2E2A26;
    --text:#EDE8E0; --text2:#B0A898; --muted:#706860;
    --accent-bg:#D4CEC5; --accent-txt:#141210;
    --green:#6AAA7A; --green-bg:#1A2820;
    --red:#C07860; --red-bg:#281A18;
    --tog-bg:#4A4540; --tog-dot:#D4CEC5;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  body{font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;}

/* AUTH */
.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.auth-box{background:var(–bg-card);border:1px solid var(–border);border-radius:6px;padding:36px 32px;width:100%;max-width:380px;}
.auth-logo{font-size:26px;font-weight:300;letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:6px;}
.auth-logo b{font-weight:700;}
.auth-sub{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(–muted);text-align:center;margin-bottom:28px;}
.auth-tabs{display:flex;border:1px solid var(–border);border-radius:3px;overflow:hidden;margin-bottom:22px;}
.auth-tab{flex:1;padding:9px;font-family:inherit;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;background:none;border:none;cursor:pointer;color:var(–muted);}
.auth-tab.on{background:var(–accent-bg);color:var(–accent-txt);}
.afg{margin-bottom:14px;}
.afg label{display:block;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(–muted);margin-bottom:5px;}
.afg input{background:var(–bg-input);border:1px solid var(–border);border-radius:3px;padding:10px 12px;font-family:inherit;font-size:13px;color:var(–text);outline:none;width:100%;-webkit-appearance:none;}
.afg input:focus{border-color:#8B6F5E;}
.auth-btn{width:100%;background:var(–accent-bg);color:var(–accent-txt);border:none;border-radius:3px;padding:11px;font-family:inherit;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:6px;}
.auth-err{font-size:11px;color:var(–red);margin-top:10px;text-align:center;min-height:16px;}

/* HEADER */
.hdr{background:var(–bg-card);border-bottom:1px solid var(–border);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;position:-webkit-sticky;position:sticky;top:0;z-index:50;}
.logo{font-size:20px;font-weight:300;letter-spacing:2px;text-transform:uppercase;color:var(–text);}
.logo b{font-weight:700;}
.hdr-r{display:flex;align-items:center;gap:12px;}
.tlabel{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(–muted);}
.tog{width:44px;height:24px;background:var(–tog-bg);border-radius:12px;position:relative;cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
.tog-dot{position:absolute;width:18px;height:18px;background:var(–tog-dot);border-radius:50%;top:3px;left:3px;transition:transform 0.3s,background 0.3s;}
.dark .tog-dot{transform:translateX(20px);}
.profile-btn{background:var(–accent-bg);color:var(–accent-txt);border:none;border-radius:50%;width:34px;height:34px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
.profile-wrap{position:relative;}
.profile-drop{display:none;position:absolute;top:42px;right:0;background:var(–bg-card);border:1px solid var(–border);border-radius:4px;min-width:220px;z-index:100;padding:16px;}
.profile-drop.show{display:block;}
.pd-name{font-size:14px;font-weight:500;color:var(–text);margin-bottom:3px;}
.pd-email{font-size:11px;color:var(–muted);margin-bottom:14px;word-break:break-all;}
.pd-div{height:1px;background:var(–border);margin-bottom:12px;}
.pd-signout{width:100%;background:none;border:1px solid var(–border);border-radius:3px;padding:8px;font-family:inherit;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;color:var(–text2);}

/* WRAP */
.wrap{max-width:920px;margin:0 auto;padding:24px 16px;}

/* SUMMARY */
.summary{display:flex;border:1px solid var(–border);border-radius:4px;overflow:hidden;margin-bottom:18px;}
.sc{flex:1;background:var(–bg-card);padding:16px 18px;}
.sc+.sc{border-left:1px solid var(–border);}
.sc-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(–muted);margin-bottom:5px;}
.sc-amt{font-size:24px;font-weight:200;letter-spacing:-0.5px;}
.sc-amt.g{color:var(–green);}
.sc-amt.r{color:var(–red);}
.sc-amt.n{color:var(–text);}
.sc-sub{font-size:9px;color:var(–muted);margin-top:3px;}

/* CAT CHIPS */
.cat-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
.cat-chip{flex:1;min-width:110px;background:var(–bg-card);border:1px solid var(–border);border-radius:4px;padding:12px 14px;}
.cat-chip-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(–muted);margin-bottom:4px;}
.cat-chip-amt{font-size:16px;font-weight:300;color:var(–red);}

/* FORM */
.card{background:var(–bg-card);border:1px solid var(–border);border-radius:4px;padding:18px;margin-bottom:18px;}
.clbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(–muted);margin-bottom:12px;}
.frow{display:grid;grid-template-columns:2fr 1.1fr 0.95fr 0.95fr 0.95fr auto;gap:7px;align-items:end;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(–muted);}
.fg input,.fg select{background:var(–bg-input);border:1px solid var(–border);border-radius:3px;padding:9px 10px;font-family:inherit;font-size:13px;color:var(–text);outline:none;width:100%;-webkit-appearance:none;appearance:none;}
.fg input::placeholder{color:var(–muted);}
.fg input:focus,.fg select:focus{border-color:#8B6F5E;}
.btn-add{background:var(–accent-bg);color:var(–accent-txt);border:none;border-radius:3px;padding:9px 13px;font-family:inherit;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;white-space:nowrap;align-self:flex-end;-webkit-tap-highlight-color:transparent;}

/* NOTE ROW in form */
.note-row{margin-top:8px;}
.fg-full{display:flex;flex-direction:column;gap:4px;}
.fg-full label{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(–muted);}
.fg-full input{background:var(–bg-input);border:1px solid var(–border);border-radius:3px;padding:9px 10px;font-family:inherit;font-size:13px;color:var(–text);outline:none;width:100%;-webkit-appearance:none;}
.fg-full input::placeholder{color:var(–muted);}
.fg-full input:focus{border-color:#8B6F5E;}

/* FILTER */
.section-hdr{margin-bottom:10px;}
.section-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
.filters{display:flex;gap:5px;flex-wrap:wrap;}
.fbtn{background:none;border:1px solid var(–border);border-radius:2px;padding:4px 10px;font-family:inherit;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(–muted);cursor:pointer;-webkit-tap-highlight-color:transparent;}
.fbtn.on{background:var(–accent-bg);color:var(–accent-txt);border-color:var(–accent-bg);}
.sub-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
.sub-filters select{background:var(–bg-input);border:1px solid var(–border);border-radius:3px;padding:5px 10px;font-family:inherit;font-size:11px;color:var(–text);outline:none;-webkit-appearance:none;appearance:none;cursor:pointer;}
.clear-btn{background:none;border:1px solid var(–border);border-radius:2px;padding:4px 10px;font-family:inherit;font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(–muted);cursor:pointer;}

/* FILTER TOTAL BANNER */
.filter-total{background:var(–bg-card);border:1px solid var(–border);border-radius:4px;padding:14px 18px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.ft-left{}
.ft-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(–muted);margin-bottom:3px;}
.ft-desc{font-size:12px;color:var(–text2);}
.ft-amt{font-size:22px;font-weight:200;}
.ft-amt.g{color:var(–green);}
.ft-amt.r{color:var(–red);}

/* DATE GROUP */
.dg{margin-bottom:16px;}
.dg-head{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:6px;border-bottom:1px solid var(–border);}
.dg-date{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(–muted);}
.dg-net{font-size:13px;font-weight:300;}

/* TXN ROW */
.trow{border-bottom:1px solid var(–border-sub);}
.trow:last-child{border-bottom:none;}
.trow-main{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:10px;padding:10px 0;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.tdesc{font-size:13px;color:var(–text);margin-bottom:3px;}
.tmeta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.tag{display:inline-block;padding:2px 7px;border-radius:2px;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;font-weight:500;}
.tg{background:var(–green-bg);color:var(–green);}
.tr{background:var(–red-bg);color:var(–red);}
.ctag{display:inline-block;padding:2px 7px;border-radius:2px;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;}
.cat-groc{background:#EEF0E8;color:#5C6B40;}
.cat-bills{background:#E8EAF0;color:#3D4A70;}
.cat-fast{background:#F0EBE8;color:#7A5040;}
.cat-other{background:#EDEAE3;color:#6B6560;}
.dark .cat-groc{background:#222A18;color:#8AAA60;}
.dark .cat-bills{background:#18202A;color:#7090C0;}
.dark .cat-fast{background:#2A1E18;color:#C08070;}
.dark .cat-other{background:#272320;color:#B0A898;}
.tamt{font-size:15px;font-weight:300;min-width:90px;text-align:right;}
.tamt.g{color:var(–green);}
.tamt.r{color:var(–red);}
.tbtns{display:flex;gap:4px;}
.bedit,.bdel{background:none;border:1px solid var(–border);border-radius:2px;padding:4px 8px;font-family:inherit;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;color:var(–text2);-webkit-tap-highlight-color:transparent;}

/* NOTE DROPDOWN */
.note-drop{display:none;padding:0 0 10px 0;}
.note-drop.open{display:block;}
.note-content{background:var(–bg-input);border:1px solid var(–border-sub);border-radius:3px;padding:10px 12px;font-size:12px;color:var(–text2);font-style:italic;line-height:1.5;}
.note-label{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(–muted);margin-bottom:5px;}

/* CHEVRON */
.chevron{font-size:10px;color:var(–muted);transition:transform 0.2s;display:inline-block;margin-left:4px;}
.chevron.open{transform:rotate(180deg);}

.empty{text-align:center;padding:44px 0;font-size:14px;font-weight:300;font-style:italic;color:var(–muted);}
.loading{text-align:center;padding:44px 0;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(–muted);}

/* MODAL */
.ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;}
.ov.show{display:flex;}
.modal{background:var(–bg-card);border:1px solid var(–border);border-radius:4px;padding:22px;width:92%;max-width:440px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:19px;font-weight:300;margin-bottom:16px;color:var(–text);}
.mfg{margin-bottom:11px;}
.mfg label{display:block;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(–muted);margin-bottom:5px;}
.mfg input,.mfg select,.mfg textarea{background:var(–bg-input);border:1px solid var(–border);border-radius:3px;padding:9px 10px;font-family:inherit;font-size:13px;color:var(–text);outline:none;width:100%;-webkit-appearance:none;appearance:none;}
.mfg textarea{resize:vertical;min-height:70px;line-height:1.5;}
.mfg input:focus,.mfg select:focus,.mfg textarea:focus{border-color:#8B6F5E;}
.macts{display:flex;gap:7px;justify-content:flex-end;margin-top:16px;}
.bcancel{background:none;border:1px solid var(–border);border-radius:3px;padding:8px 14px;font-family:inherit;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;color:var(–text2);}
.bsave{background:var(–accent-bg);color:var(–accent-txt);border:none;border-radius:3px;padding:8px 18px;font-family:inherit;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;}

@media(max-width:680px){
.frow{grid-template-columns:1fr 1fr;}
.frow .btn-add{grid-column:span 2;}
.summary{flex-direction:column;}
.sc+.sc{border-left:none;border-top:1px solid var(–border);}
.cat-chip{min-width:calc(50% - 5px);}
.trow-main{grid-template-columns:1fr auto auto;}
}
</style>

</head>

function applyTheme(t){
  theme=t;
  document.body.classList[t==='dark'?'add':'remove']('dark');
  var l=document.getElementById('tlbl');
  if(l) l.textContent=t==='dark'?'Night':'Day';

// AUTH
function switchTab(tab){
  document.getElementById('loginForm').style.display=tab==='login'?'':'none';
  document.getElementById('signupForm').style.display=tab==='signup'?'':'none';
  document.getElementById('authErr').textContent='';
  var t=document.querySelectorAll('.auth-tab');
  t[0].className='auth-tab'+(tab==='login'?' on':'');
  t[1].className='auth-tab'+(tab==='signup'?' on':'');
}
function setErr(m){document.getElementById('authErr').textContent=m;}
function doLogin(){
  var e=document.getElementById('lEmail').value.trim(), p=document.getElementById('lPass').value;
  if(!e||!p){setErr('Please fill all fields.');return;}
  auth.signInWithEmailAndPassword(e,p).catch(function(err){setErr(err.message);});
}
function doSignup(){
  var n=document.getElementById('sName').value.trim(),
      e=document.getElementById('sEmail').value.trim(),
      p=document.getElementById('sPass').value;
  if(!n||!e||!p){setErr('Please fill all fields.');return;}
  if(p.length<6){setErr('Password must be at least 6 characters.');return;}
  auth.createUserWithEmailAndPassword(e,p).then(function(c){return c.user.updateProfile({displayName:n});}).catch(function(err){setErr(err.message);});
}
function doSignOut(){if(unsub)unsub();auth.signOut();toggleProfile(true);}

auth.onAuthStateChanged(function(user){
  if(user){
    currentUser=user;
    document.getElementById('authScreen').style.display='none';
    document.getElementById('appScreen').style.display='';
    var name=user.displayName||user.email.split('@')[0];
    document.getElementById('profileBtn').textContent=name.charAt(0).toUpperCase();
    document.getElementById('pdName').textContent=name;
    document.getElementById('pdEmail').textContent=user.email;
    document.getElementById('iDt').value=td();
    loadTxns();
  } else {
    currentUser=null; txns=[];
    document.getElementById('authScreen').style.display='flex';
    document.getElementById('appScreen').style.display='none';
  }
});

// FIRESTORE
function loadTxns(){
  if(unsub) unsub();
  unsub=db.collection('users').doc(currentUser.uid).collection('transactions')
    .orderBy('date','desc')
    .onSnapshot(function(snap){
      txns=[];
      snap.forEach(function(doc){var d=doc.data();d.id=doc.id;txns.push(d);});
      render();
    },function(err){console.log(err);});
}
function saveTxn(t){
  var data={desc:t.desc,amt:t.amt,date:t.date,type:t.type,cat:t.cat||null,note:t.note||''};
  return db.collection('users').doc(currentUser.uid).collection('transactions').doc(t.id).set(data);
}
function deleteTxn(id){db.collection('users').doc(currentUser.uid).collection('transactions').doc(id).delete();}

// PROFILE
function toggleProfile(forceClose){
  var d=document.getElementById('profileDrop');
  if(forceClose) d.className='profile-drop';
  else d.className=d.className.indexOf('show')>-1?'profile-drop':'profile-drop show';
}
document.addEventListener('click',function(e){
  var pw=document.querySelector('.profile-wrap');
  if(pw&&!pw.contains(e.target)) document.getElementById('profileDrop').className='profile-drop';
});

// HELPERS
function td(){var d=new Date(),m=d.getMonth()+1,dy=d.getDate();return d.getFullYear()+'-'+(m<10?'0'+m:m)+'-'+(dy<10?'0'+dy:dy);}
function fmt(n){return 'PKR '+Math.abs(n).toLocaleString('en',{maximumFractionDigits:2});}
function fdate(s){
  var p=s.split('-'),
    mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
    wd=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
    dt=new Date(+p[0],+p[1]-1,+p[2]);
  return (s===td()?'Today':wd[dt.getDay()])+', '+p[2]+' '+mo[+p[1]-1]+' '+p[0];
}
function monthKey(s){var p=s.split('-');return p[0]+'-'+p[1];}
function monthLabel(k){
  var p=k.split('-');
  var mo=['January','February','March','April','May','June','July','August','September','October','November','December'];
  return mo[+p[1]-1]+' '+p[0];
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
var CAT_LABEL={groc:'Groceries',bills:'Bills',fast:'Fast Food',other:'Others'};
var CAT_CLASS={groc:'cat-groc',bills:'cat-bills',fast:'cat-fast',other:'cat-other'};

// FORM FIELD TOGGLE
function toggleFormFields(){
  var t=document.getElementById('iT').value;
  document.getElementById('catWrap').style.display=t==='in'?'none':'';
  document.getElementById('descLabel').textContent=t==='in'?'Contact':'Description';
  document.getElementById('iD').placeholder=t==='in'?'Sender name...':'e.g. Electricity bill...';
}
function toggleEditFields(){
  var t=document.getElementById('eT').value;
  document.getElementById('editCatWrap').style.display=t==='in'?'none':'';
  document.getElementById('eDescLabel').textContent=t==='in'?'Contact':'Description';
}

// ADD
function addTxn(){
  if(!currentUser) return;
  var d=document.getElementById('iD').value.trim(),
      a=parseFloat(document.getElementById('iA').value),
      dt=document.getElementById('iDt').value,
      t=document.getElementById('iT').value,
      c=t==='in'?null:document.getElementById('iC').value,
      note=document.getElementById('iNote').value.trim();
  if(!d||!a||a<=0||!dt) return;
  var id=Date.now()+''+Math.floor(Math.random()*9999);
  saveTxn({id:id,desc:d,amt:a,date:dt,type:t,cat:c,note:note});
  document.getElementById('iD').value='';
  document.getElementById('iA').value='';
  document.getElementById('iDt').value=td();
  document.getElementById('iT').value='out';
  document.getElementById('iC').value='groc';
  document.getElementById('iNote').value='';
  document.getElementById('catWrap').style.display='';
  document.getElementById('descLabel').textContent='Description';
  document.getElementById('iD').placeholder='e.g. Electricity bill...';
}

// FILTER
function setF(f,btn){
  filt=f;
  var bs=document.querySelectorAll('.fbtn');
  for(var i=0;i<bs.length;i++) bs[i].className='fbtn';
  btn.className='fbtn on';
  document.getElementById('personSel').style.display=(f==='in'||f==='all')?'':'none';
  render();
}
function clearSubFilters(){
  document.getElementById('monthSel').value='';
  document.getElementById('personSel').value='';
  render();
}

// NOTE TOGGLE
function toggleNote(id){
  openNotes[id]=!openNotes[id];
  var nd=document.getElementById('note-'+id);
  var ch=document.getElementById('chev-'+id);
  if(nd) nd.className='note-drop'+(openNotes[id]?' open':'');
  if(ch) ch.className='chevron'+(openNotes[id]?' open':'');
}

// EDIT
function openEdit(id){
  var t=null;
  for(var i=0;i<txns.length;i++) if(txns[i].id===id){t=txns[i];break;}
  if(!t) return;
  editId=id;
  document.getElementById('eD').value=t.desc;
  document.getElementById('eA').value=t.amt;
  document.getElementById('eDt').value=t.date;
  document.getElementById('eT').value=t.type;
  document.getElementById('eC').value=t.cat||'other';
  document.getElementById('eNote').value=t.note||'';
  document.getElementById('editCatWrap').style.display=t.type==='in'?'none':'';
  document.getElementById('eDescLabel').textContent=t.type==='in'?'Contact':'Description';
  document.getElementById('ov').className='ov show';
}
function closeModal(){document.getElementById('ov').className='ov';editId=null;}
function ovClick(e){if(e.target===document.getElementById('ov')) closeModal();}
function saveEdit(){
  var t=null;
  for(var i=0;i<txns.length;i++) if(txns[i].id===editId){t=txns[i];break;}
  if(!t) return;
  var d=document.getElementById('eD').value.trim(),
      a=parseFloat(document.getElementById('eA').value),
      dt=document.getElementById('eDt').value,
      tp=document.getElementById('eT').value,
      c=tp==='in'?null:document.getElementById('eC').value,
      note=document.getElementById('eNote').value.trim();
  if(!d||!a||a<=0||!dt) return;
  t.desc=d;t.amt=a;t.date=dt;t.type=tp;t.cat=c;t.note=note;
  saveTxn(t);closeModal();
}
function delTxn(id){deleteTxn(id);}

// RENDER
function render(){
  // Month options
  var monthSet={};
  for(var i=0;i<txns.length;i++) monthSet[monthKey(txns[i].date)]=true;
  var months=Object.keys(monthSet).sort(function(a,b){return a<b?1:-1;});
  var mSel=document.getElementById('monthSel'), curM=mSel.value;
  mSel.innerHTML='<option value="">All Months</option>';
  for(var i=0;i<months.length;i++){
    var o=document.createElement('option');
    o.value=months[i];o.textContent=monthLabel(months[i]);
    if(months[i]===curM) o.selected=true;
    mSel.appendChild(o);
  }

  // Person options (from inflow desc)
  var pSet={};
  for(var i=0;i<txns.length;i++) if(txns[i].type==='in') pSet[txns[i].desc.trim()]=true;
  var people=Object.keys(pSet).sort();
  var pSel=document.getElementById('personSel'), curP=pSel.value;
  pSel.innerHTML='<option value="">All Contacts</option>';
  for(var i=0;i<people.length;i++){
    var o=document.createElement('option');
    o.value=people[i];o.textContent=people[i];
    if(people[i]===curP) o.selected=true;
    pSel.appendChild(o);
  }
  pSel.style.display=(filt==='in'||filt==='all')?'':'none';

  var selMonth=mSel.value, selPerson=pSel.value;

  // Summary always all txns
  var tIn=0,tOut=0,cats={groc:0,bills:0,fast:0,other:0};
  for(var i=0;i<txns.length;i++){
    var t=txns[i];
    if(t.type==='in') tIn+=t.amt;
    else{tOut+=t.amt;if(t.cat&&cats[t.cat]!==undefined) cats[t.cat]+=t.amt;}
  }
  var net=tIn-tOut;
  document.getElementById('sIn').textContent=fmt(tIn);
  document.getElementById('sOut').textContent=fmt(tOut);
  document.getElementById('sNet').textContent=(net<0?'- ':'')+fmt(net);
  document.getElementById('cGroc').textContent=fmt(cats.groc);
  document.getElementById('cBills').textContent=fmt(cats.bills);
  document.getElementById('cFast').textContent=fmt(cats.fast);
  document.getElementById('cOther').textContent=fmt(cats.other);

  // Visible transactions
  var vis=txns;
  if(filt==='in') vis=txns.filter(function(t){return t.type==='in';});
  else if(filt==='out') vis=txns.filter(function(t){return t.type==='out';});
  else if(filt==='groc'||filt==='bills'||filt==='fast'||filt==='other')
    vis=txns.filter(function(t){return t.cat===filt;});
  if(selMonth) vis=vis.filter(function(t){return monthKey(t.date)===selMonth;});
  if(selPerson) vis=vis.filter(function(t){return t.type==='in'&&t.desc.trim()===selPerson;});

  var el=document.getElementById('list');

  // Build filter total banner
  var filterBanner='';
  var isFiltered=(filt!=='all'||selMonth||selPerson);
  if(isFiltered && vis.length>0){
    var fIn=0,fOut=0;
    for(var i=0;i<vis.length;i++){
      if(vis[i].type==='in') fIn+=vis[i].amt;
      else fOut+=vis[i].amt;
    }

    // Build description label
    var parts=[];
    if(filt==='in') parts.push('Inflows');
    else if(filt==='out') parts.push('Expenses');
    else if(CAT_LABEL[filt]) parts.push(CAT_LABEL[filt]);
    if(selMonth) parts.push(monthLabel(selMonth));
    if(selPerson) parts.push(selPerson);
    var filterDesc=parts.join(' · ');

    // Determine what to show
    var showIn=(filt==='in'||filt==='all'||selPerson);
    var showOut=(filt==='out'||filt==='all'||CAT_LABEL[filt]);
    filterBanner='<div class="filter-total">';
    filterBanner+='<div class="ft-left"><div class="ft-label">Filtered Total</div><div class="ft-desc">'+esc(filterDesc)+'</div></div>';
    filterBanner+='<div>';
    if(fIn>0) filterBanner+='<div class="ft-amt g">+ '+fmt(fIn)+'</div>';
    if(fOut>0) filterBanner+='<div class="ft-amt r">- '+fmt(fOut)+'</div>';
    filterBanner+='</div></div>';
  }

  if(!vis.length){el.innerHTML=filterBanner+'<div class="empty">No transactions found.</div>';return;}

  // Group by date
  var grp={};
  for(var i=0;i<vis.length;i++){var d=vis[i].date;if(!grp[d])grp[d]=[];grp[d].push(vis[i]);}
  var dates=Object.keys(grp).sort(function(a,b){return a<b?1:-1;});

  var h=filterBanner;
  for(var di=0;di<dates.length;di++){
    var date=dates[di],g=grp[date],dI=0,dO=0;
    for(var gi=0;gi<g.length;gi++) g[gi].type==='in'?dI+=g[gi].amt:dO+=g[gi].amt;
    var dn=dI-dO,nc=dn>=0?'var(--green)':'var(--red)';
    h+='<div class="dg"><div class="dg-head"><span class="dg-date">'+fdate(date)+'</span>';
    h+='<span class="dg-net" style="color:'+nc+'">'+(dn>=0?'+ ':'- ')+fmt(Math.abs(dn))+'</span></div>';
    for(var ti=0;ti<g.length;ti++){
      var t=g[ti],ic=t.type==='in';
      var catTag=(!ic&&t.cat)?'<span class="ctag '+CAT_CLASS[t.cat]+'">'+CAT_LABEL[t.cat]+'</span>':'';
      var hasNote=t.note&&t.note.trim().length>0;
      var noteOpen=openNotes[t.id]?true:false;

      h+='<div class="trow">';
      // Main row — clickable only if has note
      h+='<div class="trow-main" '+(hasNote?'onclick="toggleNote(\''+t.id+'\')"':'')+'>';
      h+='<div><div class="tdesc">'+esc(t.desc)+(hasNote?'<span class="chevron'+(noteOpen?' open':'')+'" id="chev-'+t.id+'">&#9660;</span>':'')+'</div>';
      h+='<div class="tmeta"><span class="tag '+(ic?'tg':'tr')+'">'+(ic?'Inflow':'Expense')+'</span>'+catTag+'</div></div>';
      h+='<div class="tamt '+(ic?'g':'r')+'">'+(ic?'+ ':'- ')+fmt(t.amt)+'</div>';
      h+='<div class="tbtns"><button class="bedit" onclick="event.stopPropagation();openEdit(\''+t.id+'\')">Edit</button>';
      h+='<button class="bdel" onclick="event.stopPropagation();delTxn(\''+t.id+'\')">Del</button></div></div>';

      // Note dropdown — only if note exists
      if(hasNote){
        h+='<div class="note-drop'+(noteOpen?' open':'')+'" id="note-'+t.id+'">';
        h+='<div class="note-label">Note</div>';
        h+='<div class="note-content">'+esc(t.note)+'</div></div>';
      }
      h+='</div>';
    }
    h+='</div>';
  }
  el.innerHTML=h;
}
</script>

</body>
</html>
