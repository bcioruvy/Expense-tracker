<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger</title>
<style>
/* ── RESET ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
body{font-family:-apple-system,'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:14px;min-height:100vh;}

/* ── LIGHT ── */
body.light{background:#F5F2ED;color:#1A1814;}
body.light .bg-card{background:#FAF8F5;}
body.light .bg-input{background:#EDEAE3;}
body.light .border{border-color:#D8D2C7;}
body.light .border-sub{border-color:#E5E0D8;}
body.light .col-text{color:#1A1814;}
body.light .col-text2{color:#5A5450;}
body.light .col-muted{color:#9E9890;}
body.light .col-green{color:#3D5A47;}
body.light .col-red{color:#7A3B2E;}
body.light .bg-green{background:#EDF2EF;}
body.light .bg-red{background:#F5EEEC;}
body.light .accent-bg{background:#2C2420;}
body.light .accent-txt{color:#FAF8F5;}
body.light .tog-track{background:#C0BAB0;}
body.light .tog-knob{background:#FAF8F5;left:3px;}
body.light .tag-in{background:#EDF2EF;color:#3D5A47;}
body.light .tag-out{background:#F5EEEC;color:#7A3B2E;}
body.light .cat-groc{background:#EEF0E8;color:#5C6B40;}
body.light .cat-bills{background:#E8EAF0;color:#3D4A70;}
body.light .cat-fast{background:#F0EBE8;color:#7A5040;}
body.light .cat-other{background:#EDEAE3;color:#6B6560;}
body.light .fbtn-off{background:none;color:#9E9890;border-color:#D8D2C7;}
body.light .fbtn-on{background:#2C2420;color:#FAF8F5;border-color:#2C2420;}
body.light .note-box{background:#F0EDE8;border-color:#E5E0D8;color:#5A5450;}
body.light .filter-banner{background:#FAF8F5;border-color:#D8D2C7;}
body.light input,body.light select,body.light textarea{background:#EDEAE3;border:1px solid #D8D2C7;color:#1A1814;}
body.light input::placeholder,body.light textarea::placeholder{color:#B0A8A0;}
body.light .auth-box{background:#FAF8F5;border-color:#D8D2C7;}
body.light .profile-drop{background:#FAF8F5;border-color:#D8D2C7;}
body.light .modal-box{background:#FAF8F5;border-color:#D8D2C7;}
body.light .sel-wrap select{background:#EDEAE3;border-color:#D8D2C7;color:#1A1814;}

/* ── DARK ── */
body.dark{background:#141210;color:#EDE8E0;}
body.dark .bg-card{background:#1E1B18;}
body.dark .bg-input{background:#2A2620;}
body.dark .border{border-color:#3A3530;}
body.dark .border-sub{border-color:#2E2A26;}
body.dark .col-text{color:#EDE8E0;}
body.dark .col-text2{color:#B0A898;}
body.dark .col-muted{color:#706860;}
body.dark .col-green{color:#6AAA7A;}
body.dark .col-red{color:#C07860;}
body.dark .bg-green{background:#1A2820;}
body.dark .bg-red{background:#281A18;}
body.dark .accent-bg{background:#D4CEC5;}
body.dark .accent-txt{color:#141210;}
body.dark .tog-track{background:#4A4540;}
body.dark .tog-knob{background:#D4CEC5;left:23px;}
body.dark .tag-in{background:#1A2820;color:#6AAA7A;}
body.dark .tag-out{background:#281A18;color:#C07860;}
body.dark .cat-groc{background:#1E2A14;color:#8AAA60;}
body.dark .cat-bills{background:#141E2A;color:#7090C0;}
body.dark .cat-fast{background:#2A1A14;color:#C08070;}
body.dark .cat-other{background:#2A2620;color:#B0A898;}
body.dark .fbtn-off{background:none;color:#706860;border-color:#3A3530;}
body.dark .fbtn-on{background:#D4CEC5;color:#141210;border-color:#D4CEC5;}
body.dark .note-box{background:#242018;border-color:#3A3530;color:#B0A898;}
body.dark .filter-banner{background:#1E1B18;border-color:#3A3530;}
body.dark input,body.dark select,body.dark textarea{background:#2A2620;border:1px solid #3A3530;color:#EDE8E0;}
body.dark input::placeholder,body.dark textarea::placeholder{color:#706860;}
body.dark .auth-box{background:#1E1B18;border-color:#3A3530;}
body.dark .profile-drop{background:#1E1B18;border-color:#3A3530;}
body.dark .modal-box{background:#1E1B18;border-color:#3A3530;}
body.dark .sel-wrap select{background:#2A2620;border-color:#3A3530;color:#EDE8E0;}

/* ── ALL INPUTS ── */
input,select,textarea{
font-family:-apple-system,‘Helvetica Neue’,Helvetica,Arial,sans-serif;
font-size:13px;
border-radius:3px;
outline:none;
-webkit-appearance:none;
appearance:none;
width:100%;
padding:9px 11px;
}
input:focus,select:focus,textarea:focus{border-color:#8B6F5E !important;}
textarea{resize:vertical;min-height:68px;line-height:1.5;}

/* ── AUTH ── */
.auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.auth-box{border:1px solid;border-radius:6px;padding:36px 32px;width:100%;max-width:380px;}
.auth-logo{font-size:24px;font-weight:200;letter-spacing:4px;text-transform:uppercase;text-align:center;margin-bottom:5px;}
.auth-logo strong{font-weight:700;}
.auth-sub{font-size:9px;letter-spacing:3px;text-transform:uppercase;text-align:center;margin-bottom:26px;}
.auth-tabs{display:flex;border:1px solid #3A3530;border-radius:3px;overflow:hidden;margin-bottom:20px;}
body.light .auth-tabs{border-color:#D8D2C7;}
.auth-tab{flex:1;padding:9px;font-family:inherit;font-size:9px;letter-spacing:2px;text-transform:uppercase;background:none;border:none;cursor:pointer;}
body.light .auth-tab{color:#9E9890;}
body.dark .auth-tab{color:#706860;}
.auth-tab.on{font-weight:600;}
body.light .auth-tab.on{background:#2C2420;color:#FAF8F5;}
body.dark .auth-tab.on{background:#D4CEC5;color:#141210;}
.afg{margin-bottom:13px;}
.afg label{display:block;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
body.light .afg label{color:#9E9890;}
body.dark .afg label{color:#706860;}
.auth-btn{width:100%;border:none;border-radius:3px;padding:11px;font-family:inherit;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;margin-top:6px;font-weight:600;}
body.light .auth-btn{background:#2C2420;color:#FAF8F5;}
body.dark .auth-btn{background:#D4CEC5;color:#141210;}
.auth-err{font-size:11px;margin-top:10px;text-align:center;min-height:16px;}
body.light .auth-err{color:#7A3B2E;}
body.dark .auth-err{color:#C07860;}

/* ── HEADER ── */
.hdr{border-bottom:1px solid;padding:0 22px;height:56px;display:flex;align-items:center;justify-content:space-between;position:-webkit-sticky;position:sticky;top:0;z-index:50;}
body.light .hdr{background:#FAF8F5;border-color:#D8D2C7;}
body.dark .hdr{background:#1E1B18;border-color:#3A3530;}
.logo{font-size:18px;font-weight:200;letter-spacing:4px;text-transform:uppercase;}
.logo strong{font-weight:800;}
.hdr-r{display:flex;align-items:center;gap:14px;}
.theme-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;}
body.light .theme-lbl{color:#9E9890;}
body.dark .theme-lbl{color:#706860;}

/* TOGGLE */
.tog-wrap{cursor:pointer;-webkit-tap-highlight-color:transparent;}
.tog-track{width:44px;height:24px;border-radius:12px;position:relative;transition:background 0.3s;}
.tog-knob{position:absolute;width:18px;height:18px;border-radius:50%;top:3px;transition:left 0.3s,background 0.3s;}

/* PROFILE */
.profile-btn{border:none;border-radius:50%;width:34px;height:34px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;flex-shrink:0;}
body.light .profile-btn{background:#2C2420;color:#FAF8F5;}
body.dark .profile-btn{background:#D4CEC5;color:#141210;}
.profile-wrap{position:relative;}
.profile-drop{display:none;position:absolute;top:42px;right:0;border:1px solid;border-radius:4px;min-width:220px;z-index:200;padding:16px;}
.profile-drop.open{display:block;}
.pd-name{font-size:14px;font-weight:500;margin-bottom:3px;}
body.light .pd-name{color:#1A1814;}
body.dark .pd-name{color:#EDE8E0;}
.pd-email{font-size:11px;margin-bottom:14px;word-break:break-all;}
body.light .pd-email{color:#9E9890;}
body.dark .pd-email{color:#706860;}
.pd-hr{height:1px;margin-bottom:12px;}
body.light .pd-hr{background:#D8D2C7;}
body.dark .pd-hr{background:#3A3530;}
.pd-out{width:100%;background:none;border:1px solid;border-radius:3px;padding:8px;font-family:inherit;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;}
body.light .pd-out{border-color:#D8D2C7;color:#5A5450;}
body.dark .pd-out{border-color:#3A3530;color:#B0A898;}

/* ── WRAP ── */
.wrap{max-width:920px;margin:0 auto;padding:22px 16px;}

/* ── SUMMARY ── */
.summary{display:flex;border:1px solid;border-radius:4px;overflow:hidden;margin-bottom:16px;}
body.light .summary{border-color:#D8D2C7;}
body.dark .summary{border-color:#3A3530;}
.sc{flex:1;padding:15px 18px;}
body.light .sc{background:#FAF8F5;}
body.dark .sc{background:#1E1B18;}
.sc+.sc{border-left:1px solid;}
body.light .sc+.sc{border-color:#D8D2C7;}
body.dark .sc+.sc{border-color:#3A3530;}
.sc-lbl{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:5px;}
body.light .sc-lbl{color:#9E9890;}
body.dark .sc-lbl{color:#706860;}
.sc-amt{font-size:23px;font-weight:200;letter-spacing:-0.5px;}
.sc-sub{font-size:9px;margin-top:3px;}
body.light .sc-sub{color:#9E9890;}
body.dark .sc-sub{color:#706860;}

/* ── CAT CHIPS ── */
.cat-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
.cat-chip{flex:1;min-width:110px;border:1px solid;border-radius:4px;padding:11px 14px;}
body.light .cat-chip{background:#FAF8F5;border-color:#D8D2C7;}
body.dark .cat-chip{background:#1E1B18;border-color:#3A3530;}
.cc-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
body.light .cc-lbl{color:#9E9890;}
body.dark .cc-lbl{color:#706860;}
.cc-amt{font-size:16px;font-weight:300;}
body.light .cc-amt{color:#7A3B2E;}
body.dark .cc-amt{color:#C07860;}

/* ── FORM CARD ── */
.form-card{border:1px solid;border-radius:4px;padding:18px;margin-bottom:18px;}
body.light .form-card{background:#FAF8F5;border-color:#D8D2C7;}
body.dark .form-card{background:#1E1B18;border-color:#3A3530;}
.sec-lbl{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:12px;}
body.light .sec-lbl{color:#9E9890;}
body.dark .sec-lbl{color:#706860;}
.frow{display:grid;grid-template-columns:2fr 1.1fr 1fr 1fr 1fr auto;gap:7px;align-items:end;}
.fg{display:flex;flex-direction:column;gap:4px;}
.fg label,.fg-full label{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;}
body.light .fg label,body.light .fg-full label{color:#9E9890;}
body.dark .fg label,body.dark .fg-full label{color:#706860;}
.fg-full{display:flex;flex-direction:column;gap:4px;margin-top:8px;}
.add-btn{border:none;border-radius:3px;padding:9px 14px;font-family:inherit;font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;white-space:nowrap;align-self:flex-end;font-weight:600;-webkit-tap-highlight-color:transparent;}
body.light .add-btn{background:#2C2420;color:#FAF8F5;}
body.dark .add-btn{background:#D4CEC5;color:#141210;}

/* ── FILTER BAR ── */
.txn-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:6px;}
.filters{display:flex;gap:5px;flex-wrap:wrap;}
.fbtn{border:1px solid;border-radius:2px;padding:4px 10px;font-family:inherit;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.sub-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
.sel-wrap select{border:1px solid;border-radius:3px;padding:5px 10px;font-family:inherit;font-size:11px;width:auto;}
.clear-btn{background:none;border:1px solid;border-radius:2px;padding:4px 10px;font-family:inherit;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;}
body.light .clear-btn{border-color:#D8D2C7;color:#9E9890;}
body.dark .clear-btn{border-color:#3A3530;color:#706860;}

/* ── FILTER BANNER ── */
.filter-banner{border:1px solid;border-radius:4px;padding:13px 16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.fb-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;margin-bottom:3px;}
body.light .fb-lbl{color:#9E9890;}
body.dark .fb-lbl{color:#706860;}
.fb-desc{font-size:12px;}
body.light .fb-desc{color:#5A5450;}
body.dark .fb-desc{color:#B0A898;}
.fb-amt{font-size:21px;font-weight:200;}

/* ── DATE GROUP ── */
.dg{margin-bottom:14px;}
.dg-head{display:flex;justify-content:space-between;align-items:baseline;padding-bottom:6px;border-bottom:1px solid;}
body.light .dg-head{border-color:#D8D2C7;}
body.dark .dg-head{border-color:#3A3530;}
.dg-date{font-size:8px;letter-spacing:2.5px;text-transform:uppercase;}
body.light .dg-date{color:#9E9890;}
body.dark .dg-date{color:#706860;}
.dg-net{font-size:13px;font-weight:300;}

/* ── TXN ROW ── */
.trow{border-bottom:1px solid;}
body.light .trow{border-color:#E5E0D8;}
body.dark .trow{border-color:#2E2A26;}
.trow:last-child{border-bottom:none;}
.trow-main{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:10px;padding:10px 0;-webkit-tap-highlight-color:transparent;}
.trow-main.clickable{cursor:pointer;}
.tdesc{font-size:13px;margin-bottom:3px;font-weight:400;}
body.light .tdesc{color:#1A1814;}
body.dark .tdesc{color:#EDE8E0;}
.tmeta{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.tag{display:inline-block;padding:2px 7px;border-radius:2px;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;}
.ctag{display:inline-block;padding:2px 7px;border-radius:2px;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;font-weight:400;}
.tamt{font-size:15px;font-weight:300;min-width:95px;text-align:right;}
.tbtns{display:flex;gap:4px;}
.bedit,.bdel{background:none;border:1px solid;border-radius:2px;padding:4px 9px;font-family:inherit;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;-webkit-tap-highlight-color:transparent;}
body.light .bedit,body.light .bdel{border-color:#D8D2C7;color:#5A5450;}
body.dark .bedit,body.dark .bdel{border-color:#3A3530;color:#B0A898;}
.chev{font-size:9px;margin-left:5px;display:inline-block;transition:transform 0.2s;}
body.light .chev{color:#9E9890;}
body.dark .chev{color:#706860;}
.chev.open{transform:rotate(180deg);}

/* NOTE DROPDOWN */
.note-drop{display:none;padding-bottom:10px;}
.note-drop.open{display:block;}
.note-inner{border-radius:3px;padding:10px 12px;font-size:12px;font-style:italic;line-height:1.5;border:1px solid;}
body.light .note-inner{background:#EDEAE3;border-color:#E5E0D8;color:#5A5450;}
body.dark .note-inner{background:#242018;border-color:#3A3530;color:#B0A898;}
.note-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;margin-bottom:5px;}
body.light .note-lbl{color:#9E9890;}
body.dark .note-lbl{color:#706860;}

.empty{text-align:center;padding:44px 0;font-size:14px;font-weight:300;font-style:italic;}
body.light .empty{color:#9E9890;}
body.dark .empty{color:#706860;}
.loading{text-align:center;padding:44px 0;font-size:10px;letter-spacing:3px;text-transform:uppercase;}
body.light .loading{color:#9E9890;}
body.dark .loading{color:#706860;}

/* ── MODAL ── */
.ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);z-index:200;align-items:center;justify-content:center;}
.ov.open{display:flex;}
.modal-box{border:1px solid;border-radius:4px;padding:22px;width:92%;max-width:440px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:18px;font-weight:300;margin-bottom:16px;}
body.light .modal-title{color:#1A1814;}
body.dark .modal-title{color:#EDE8E0;}
.mfg{margin-bottom:11px;}
.mfg label{display:block;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:5px;}
body.light .mfg label{color:#9E9890;}
body.dark .mfg label{color:#706860;}
.macts{display:flex;gap:7px;justify-content:flex-end;margin-top:16px;}
.m-cancel{background:none;border:1px solid;border-radius:3px;padding:8px 14px;font-family:inherit;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;}
body.light .m-cancel{border-color:#D8D2C7;color:#5A5450;}
body.dark .m-cancel{border-color:#3A3530;color:#B0A898;}
.m-save{border:none;border-radius:3px;padding:8px 18px;font-family:inherit;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;font-weight:600;}
body.light .m-save{background:#2C2420;color:#FAF8F5;}
body.dark .m-save{background:#D4CEC5;color:#141210;}

@media(max-width:680px){
.frow{grid-template-columns:1fr 1fr;}
.frow .add-btn{grid-column:span 2;}
.summary{flex-direction:column;}
.sc+.sc{border-left:none;border-top:1px solid;}
body.light .sc+.sc{border-color:#D8D2C7;}
body.dark .sc+.sc{border-color:#3A3530;}
.cat-chip{min-width:calc(50% - 5px);}
}
</style>

</head>

<div class="form-card">

<div class="ov" id="ov" onclick="ovClick(event)">
  <div class="modal-box">
    <div class="modal-title">Edit Transaction</div>
    <div class="mfg"><label id="eLbl">Description</label><input type="text" id="eD"></div>
    <div class="mfg"><label>Amount (PKR)</label><input type="number" id="eA" min="0"></div>
    <div class="mfg"><label>Date</label><input type="date" id="eDt"></div>
    <div class="mfg"><label>Type</label><select id="eT" onchange="onEditType()"><option value="out">Expense</option><option value="in">Inflow</option></select></div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyBlNXGwMmp6bRkgZjyhPzGuXvujG4Xa4gM",
  authDomain:"ledger-app-9ca93.firebaseapp.com",
  projectId:"ledger-app-9ca93",
  storageBucket:"ledger-app-9ca93.firebasestorage.app",
  messagingSenderId:"993768476078",
  appId:"1:993768476078:web:ddc89badcaa7307773cc3f"
});
var auth=firebase.auth(), db=firebase.firestore();
var txns=[], editId=null, filt='all', user=null, unsub=null, openNotes={};

/* ── THEME ── */
var theme='light';
try{theme=localStorage.getItem('ldgT')||'light';}catch(e){}
applyTheme(theme);
function applyTheme(t){
  theme=t;
  document.body.className=t;
  var lbl=document.getElementById('tlbl');
  if(lbl) lbl.textContent=t==='dark'?'Night':'Day';
  try{localStorage.setItem('ldgT',t);}catch(e){}
}
function toggleTheme(){applyTheme(theme==='dark'?'light':'dark');}

/* ── AUTH ── */
function switchTab(tab){
  document.getElementById('loginForm').style.display=tab==='login'?'':'none';
  document.getElementById('signupForm').style.display=tab==='signup'?'':'none';
  document.getElementById('authErr').textContent='';
  var tabs=document.querySelectorAll('.auth-tab');
  tabs[0].className='auth-tab'+(tab==='login'?' on':'');
  tabs[1].className='auth-tab'+(tab==='signup'?' on':'');
}
function setErr(m){document.getElementById('authErr').textContent=m;}
function doLogin(){
  var e=document.getElementById('lEmail').value.trim(), p=document.getElementById('lPass').value;
  if(!e||!p){setErr('Please fill all fields.');return;}
  auth.signInWithEmailAndPassword(e,p).catch(function(err){setErr(err.message);});
}
function doSignup(){
  var n=document.getElementById('sName').value.trim(),
      e=document.getElementById('sEmail').value.trim(),
      p=document.getElementById('sPass').value;
  if(!n||!e||!p){setErr('Please fill all fields.');return;}
  if(p.length<6){setErr('Password needs 6+ characters.');return;}
  auth.createUserWithEmailAndPassword(e,p)
    .then(function(c){return c.user.updateProfile({displayName:n});})
    .catch(function(err){setErr(err.message);});
}
function doSignOut(){if(unsub)unsub();auth.signOut();closeProfile();}

auth.onAuthStateChanged(function(u){
  if(u){
    user=u;
    document.getElementById('authScreen').style.display='none';
    document.getElementById('appScreen').style.display='';
    var name=u.displayName||u.email.split('@')[0];
    document.getElementById('profileBtn').textContent=name.charAt(0).toUpperCase();
    document.getElementById('pdName').textContent=name;
    document.getElementById('pdEmail').textContent=u.email;
    document.getElementById('iDt').value=td();
    loadTxns();
  } else {
    user=null; txns=[];
    document.getElementById('authScreen').style.display='flex';
    document.getElementById('appScreen').style.display='none';
  }
});

/* ── FIRESTORE ── */
function loadTxns(){
  if(unsub) unsub();
  unsub=db.collection('users').doc(user.uid).collection('transactions')
    .orderBy('date','desc')
    .onSnapshot(function(s){
      txns=[];
      s.forEach(function(d){var x=d.data();x.id=d.id;txns.push(x);});
      render();
    });
}
function saveTxn(t){
  return db.collection('users').doc(user.uid).collection('transactions').doc(t.id)
    .set({desc:t.desc,amt:t.amt,date:t.date,type:t.type,cat:t.cat||null,note:t.note||''});
}
function deleteTxn(id){db.collection('users').doc(user.uid).collection('transactions').doc(id).delete();}

/* ── PROFILE ── */
function toggleProfile(){
  var d=document.getElementById('profileDrop');
  d.className=d.className.indexOf('open')>-1?'profile-drop':'profile-drop open';
}
function closeProfile(){document.getElementById('profileDrop').className='profile-drop';}
document.addEventListener('click',function(e){
  var pw=document.querySelector('.profile-wrap');
  if(pw&&!pw.contains(e.target)) closeProfile();
});

/* ── HELPERS ── */
function td(){var d=new Date(),m=d.getMonth()+1,dy=d.getDate();return d.getFullYear()+'-'+(m<10?'0'+m:m)+'-'+(dy<10?'0'+dy:dy);}
function fmt(n){return 'PKR '+Math.abs(n).toLocaleString('en',{maximumFractionDigits:2});}
function fdate(s){
  var p=s.split('-'),
    mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
    wd=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],
    dt=new Date(+p[0],+p[1]-1,+p[2]);
  return (s===td()?'Today':wd[dt.getDay()])+', '+p[2]+' '+mo[+p[1]-1]+' '+p[0];
}
function mKey(s){var p=s.split('-');return p[0]+'-'+p[1];}
function mLabel(k){
  var p=k.split('-');
  var mo=['January','February','March','April','May','June','July','August','September','October','November','December'];
  return mo[+p[1]-1]+' '+p[0];
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
var CLBL={groc:'Groceries',bills:'Bills',fast:'Fast Food',other:'Others'};
var CCLS={groc:'cat-groc',bills:'cat-bills',fast:'cat-fast',other:'cat-other'};

/* ── FORM ── */
function onTypeChange(){
  var t=document.getElementById('iT').value;
  document.getElementById('catWrap').style.display=t==='in'?'none':'';
  document.getElementById('descLbl').textContent=t==='in'?'Contact':'Description';
  document.getElementById('iD').placeholder=t==='in'?'Sender name...':'e.g. Electricity bill...';
}
function onEditType(){
  var t=document.getElementById('eT').value;
  document.getElementById('eCatWrap').style.display=t==='in'?'none':'';
  document.getElementById('eLbl').textContent=t==='in'?'Contact':'Description';
}

/* ── ADD ── */
function addTxn(){
  if(!user) return;
  var d=document.getElementById('iD').value.trim(),
      a=parseFloat(document.getElementById('iA').value),
      dt=document.getElementById('iDt').value,
      t=document.getElementById('iT').value,
      c=t==='in'?null:document.getElementById('iC').value,
      note=document.getElementById('iNote').value.trim();
  if(!d||!a||a<=0||!dt) return;
  var id=Date.now()+''+Math.floor(Math.random()*9999);
  saveTxn({id:id,desc:d,amt:a,date:dt,type:t,cat:c,note:note});
  document.getElementById('iD').value='';
  document.getElementById('iA').value='';
  document.getElementById('iDt').value=td();
  document.getElementById('iT').value='out';
  document.getElementById('iC').value='groc';
  document.getElementById('iNote').value='';
  document.getElementById('catWrap').style.display='';
  document.getElementById('descLbl').textContent='Description';
  document.getElementById('iD').placeholder='e.g. Electricity bill...';
}

/* ── FILTER ── */
function setF(f,btn){
  filt=f;
  var bs=document.querySelectorAll('.fbtn');
  for(var i=0;i<bs.length;i++) bs[i].className='fbtn fbtn-off';
  btn.className='fbtn fbtn-on';
  document.getElementById('personSel').style.display=(f==='in'||f==='all')?'':'none';
  render();
}
function clearSub(){
  document.getElementById('monthSel').value='';
  document.getElementById('personSel').value='';
  render();
}

/* ── NOTE TOGGLE ── */
function toggleNote(id){
  openNotes[id]=!openNotes[id];
  var nd=document.getElementById('nd-'+id), ch=document.getElementById('ch-'+id);
  if(nd) nd.className='note-drop'+(openNotes[id]?' open':'');
  if(ch) ch.className='chev'+(openNotes[id]?' open':'');
}

/* ── EDIT ── */
function openEdit(id){
  var t=null;
  for(var i=0;i<txns.length;i++) if(txns[i].id===id){t=txns[i];break;}
  if(!t) return;
  editId=id;
  document.getElementById('eD').value=t.desc;
  document.getElementById('eA').value=t.amt;
  document.getElementById('eDt').value=t.date;
  document.getElementById('eT').value=t.type;
  document.getElementById('eC').value=t.cat||'other';
  document.getElementById('eNote').value=t.note||'';
  document.getElementById('eCatWrap').style.display=t.type==='in'?'none':'';
  document.getElementById('eLbl').textContent=t.type==='in'?'Contact':'Description';
  document.getElementById('ov').className='ov open';
}
function closeModal(){document.getElementById('ov').className='ov';editId=null;}
function ovClick(e){if(e.target===document.getElementById('ov')) closeModal();}
function saveEdit(){
  var t=null;
  for(var i=0;i<txns.length;i++) if(txns[i].id===editId){t=txns[i];break;}
  if(!t) return;
  var d=document.getElementById('eD').value.trim(),
      a=parseFloat(document.getElementById('eA').value),
      dt=document.getElementById('eDt').value,
      tp=document.getElementById('eT').value,
      c=tp==='in'?null:document.getElementById('eC').value,
      note=document.getElementById('eNote').value.trim();
  if(!d||!a||a<=0||!dt) return;
  t.desc=d;t.amt=a;t.date=dt;t.type=tp;t.cat=c;t.note=note;
  saveTxn(t);closeModal();
}
function delTxn(id){deleteTxn(id);}

/* ── RENDER ── */
function render(){
  // Month options
  var mSet={};
  for(var i=0;i<txns.length;i++) mSet[mKey(txns[i].date)]=true;
  var months=Object.keys(mSet).sort(function(a,b){return a<b?1:-1;});
  var mSel=document.getElementById('monthSel'), curM=mSel.value;
  mSel.innerHTML='<option value="">All Months</option>';
  for(var i=0;i<months.length;i++){
    var o=document.createElement('option');
    o.value=months[i];o.textContent=mLabel(months[i]);
    if(months[i]===curM) o.selected=true;
    mSel.appendChild(o);
  }

  // Person options
  var pSet={};
  for(var i=0;i<txns.length;i++) if(txns[i].type==='in') pSet[txns[i].desc.trim()]=true;
  var people=Object.keys(pSet).sort();
  var pSel=document.getElementById('personSel'), curP=pSel.value;
  pSel.innerHTML='<option value="">All Contacts</option>';
  for(var i=0;i<people.length;i++){
    var o=document.createElement('option');
    o.value=people[i];o.textContent=people[i];
    if(people[i]===curP) o.selected=true;
    pSel.appendChild(o);
  }
  pSel.style.display=(filt==='in'||filt==='all')?'':'none';

  var selM=mSel.value, selP=pSel.value;

  // Global summary (all txns, no filters)
  var tIn=0,tOut=0,cats={groc:0,bills:0,fast:0,other:0};
  for(var i=0;i<txns.length;i++){
    var t=txns[i];
    if(t.type==='in') tIn+=t.amt;
    else{tOut+=t.amt;if(t.cat&&cats[t.cat]!==undefined) cats[t.cat]+=t.amt;}
  }
  var net=tIn-tOut;
  document.getElementById('sIn').textContent=fmt(tIn);
  document.getElementById('sOut').textContent=fmt(tOut);
  document.getElementById('sNet').textContent=(net<0?'- ':'')+fmt(net);
  document.getElementById('cGroc').textContent=fmt(cats.groc);
  document.getElementById('cBills').textContent=fmt(cats.bills);
  document.getElementById('cFast').textContent=fmt(cats.fast);
  document.getElementById('cOther').textContent=fmt(cats.other);

  // Visible
  var vis=txns;
  if(filt==='in') vis=txns.filter(function(t){return t.type==='in';});
  else if(filt==='out') vis=txns.filter(function(t){return t.type==='out';});
  else if(CLBL[filt]) vis=txns.filter(function(t){return t.cat===filt;});
  if(selM) vis=vis.filter(function(t){return mKey(t.date)===selM;});
  if(selP) vis=vis.filter(function(t){return t.type==='in'&&t.desc.trim()===selP;});

  var el=document.getElementById('list');

  // Filter banner
  var banner='';
  var isFiltered=(filt!=='all'||selM||selP);
  if(isFiltered&&vis.length>0){
    var fIn=0,fOut=0;
    for(var i=0;i<vis.length;i++){
      if(vis[i].type==='in') fIn+=vis[i].amt; else fOut+=vis[i].amt;
    }
    var parts=[];
    if(filt==='in') parts.push('Inflows');
    else if(filt==='out') parts.push('Expenses');
    else if(CLBL[filt]) parts.push(CLBL[filt]);
    if(selM) parts.push(mLabel(selM));
    if(selP) parts.push(selP);
    banner='<div class="filter-banner">';
    banner+='<div><div class="fb-lbl">Filtered Total</div><div class="fb-desc">'+esc(parts.join(' · '))+'</div></div>';
    banner+='<div>';
    if(fIn>0) banner+='<div class="fb-amt col-green">+ '+fmt(fIn)+'</div>';
    if(fOut>0) banner+='<div class="fb-amt col-red">- '+fmt(fOut)+'</div>';
    banner+='</div></div>';
  }

  if(!vis.length){el.innerHTML=banner+'<div class="empty">No transactions found.</div>';return;}

  var grp={};
  for(var i=0;i<vis.length;i++){var d=vis[i].date;if(!grp[d])grp[d]=[];grp[d].push(vis[i]);}
  var dates=Object.keys(grp).sort(function(a,b){return a<b?1:-1;});

  var h=banner;
  for(var di=0;di<dates.length;di++){
    var date=dates[di],g=grp[date],dI=0,dO=0;
    for(var gi=0;gi<g.length;gi++) g[gi].type==='in'?dI+=g[gi].amt:dO+=g[gi].amt;
    var dn=dI-dO;
    var nc=dn>=0?'col-green':'col-red';
    h+='<div class="dg"><div class="dg-head"><span class="dg-date">'+fdate(date)+'</span>';
    h+='<span class="dg-net '+nc+'">'+(dn>=0?'+ ':'- ')+fmt(Math.abs(dn))+'</span></div>';
    for(var ti=0;ti<g.length;ti++){
      var t=g[ti], ic=t.type==='in';
      var hasNote=t.note&&t.note.trim().length>0;
      var isOpen=openNotes[t.id]?true:false;
      var catTag=(!ic&&t.cat)?'<span class="ctag '+CCLS[t.cat]+'">'+CLBL[t.cat]+'</span>':'';
      h+='<div class="trow">';
      h+='<div class="trow-main'+(hasNote?' clickable':'')+'"'+(hasNote?' onclick="toggleNote(\''+t.id+'\')"':'')+'>';
      h+='<div>';
      h+='<div class="tdesc">'+esc(t.desc);
      if(hasNote) h+='<span class="chev'+(isOpen?' open':'')+'" id="ch-'+t.id+'">&#9660;</span>';
      h+='</div>';
      h+='<div class="tmeta"><span class="tag '+(ic?'tag-in':'tag-out')+'">'+(ic?'Inflow':'Expense')+'</span>'+catTag+'</div></div>';
      h+='<div class="tamt '+(ic?'col-green':'col-red')+'">'+(ic?'+ ':'- ')+fmt(t.amt)+'</div>';
      h+='<div class="tbtns">';
      h+='<button class="bedit" onclick="event.stopPropagation();openEdit(\''+t.id+'\')">Edit</button>';
      h+='<button class="bdel" onclick="event.stopPropagation();delTxn(\''+t.id+'\')">Del</button>';
      h+='</div></div>';
      if(hasNote){
        h+='<div class="note-drop'+(isOpen?' open':'')+'" id="nd-'+t.id+'">';
        h+='<div class="note-lbl">Note</div>';
        h+='<div class="note-inner">'+esc(t.note)+'</div></div>';
      }
      h+='</div>';
    }
    h+='</div>';
  }
  el.innerHTML=h;
}
</script>
